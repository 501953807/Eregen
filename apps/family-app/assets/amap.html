<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Eregen Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, 'PingFang SC', sans-serif; }
    #container { width: 100%; height: 100%; }
    .info-overlay {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      z-index: 10;
      pointer-events: none;
    }
    .info-address { font-size: 13px; font-weight: 600; color: #333; }
    .info-time { font-size: 10px; color: #999; margin-top: 2px; }
  </style>
  <!-- 高德地图 JS API v2.0，使用 GCJ-02 坐标系 -->
  <script src="https://webapi.amap.com/maps?v=2.0&key=YOUR_AMAP_KEY&plugin=AMap.Geolocation,AMap.Geocoder"
    onerror="window.FlutterReady=false; Flutter.postMessage(JSON.stringify({event:'map_error', message:'高德地图SDK加载失败'}));"></script>
</head>
<body>
  <div id="container"></div>
  <div class="info-overlay" id="infoOverlay">
    <div class="info-address" id="address">定位中...</div>
    <div class="info-time" id="time"></div>
  </div>

  <script>
    window.FlutterReady = false;
    let map = null;
    let marker = null;
    let circle = null;
    let geocoder = null;

    // Wait for AMap SDK to load before initializing
    function waitForAMap(callback) {
      let attempts = 0;
      const interval = setInterval(() => {
        attempts++;
        if (typeof AMap !== 'undefined') {
          clearInterval(interval);
          callback();
        } else if (attempts > 50) {
          // Timeout after ~5 seconds
          window.FlutterReady = true;
          Flutter.postMessage(JSON.stringify({event:'map_error', message:'地图SDK加载超时'}));
        }
      }, 100);
    }

    // Initialize map centered on default location
    function initMap(lat, lng) {
      if (typeof AMap === 'undefined') return;

      map = new AMap.Map('container', {
        zoom: 15,
        center: [lng, lat], // AMap uses [lng, lat] order
        mapStyle: 'amap://styles/normal',
      });

      // Custom marker icon — Eregen brand color #4A90D9
      const icon = new AMap.Icon({
        size: new AMap.Size(36, 36),
        image: 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36"><circle cx="18" cy="18" r="14" fill="#4A90D9"/><circle cx="18" cy="18" r="6" fill="#fff"/></svg>`),
        imageSize: new AMap.Size(36, 36),
      });
      marker = new AMap.Marker({
        position: [lng, lat],
        icon: icon,
        anchor: 'center',
      });
      map.add(marker);

      // Reverse geocode for address
      geocoder = new AMap.Geocoder({});
      getAddress(lng, lat);
      window.FlutterReady = true;
      Flutter.postMessage(JSON.stringify({event:'map_ready'}));
    }

    function getAddress(lng, lat) {
      if (!geocoder) return;
      geocoder.getAddress([lng, lat], function(status, result) {
        if (status === 'complete' && result.regeocode) {
          const addr = result.regeocode.formattedAddress;
          document.getElementById('address').textContent = '📍 ' + addr;
        } else {
          document.getElementById('address').textContent = '📍 定位中...';
        }
        document.getElementById('time').textContent = '更新时间：' + formatTime();
        Flutter.postMessage(JSON.stringify({
          map_address: document.getElementById('address').textContent,
          map_time: document.getElementById('time').textContent
        }));
      });
    }

    function updateMarker(lng, lat) {
      if (!map || !marker) return;
      marker.setPosition([lng, lat]);
      map.setCenter([lng, lat]);
      getAddress(lng, lat);
    }

    function addCircle(centerLng, centerLat, radius, color) {
      if (circle) map.remove(circle);
      circle = new AMap.Circle({
        center: [centerLng, centerLat],
        radius: radius,
        strokeColor: color || '#4A90D9',
        strokeWeight: 2,
        strokeOpacity: 0.6,
        fillColor: color || '#4A90D9',
        fillOpacity: 0.08,
      });
      map.add(circle);
    }

    function formatTime() {
      const d = new Date();
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    // Start waiting for AMap SDK after DOM ready
    window.onload = function() {
      waitForAMap(function() {
        initMap(31.2304, 121.4737); // Default: Shanghai
      });
    };
  </script>
</body>
</html>
