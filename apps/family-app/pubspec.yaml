name: eregen_family_app
description: Eregen Family App - Monitor loved ones' health, location, and medication
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.24.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3
  provider: ^6.1.1

  # Networking
  dio: ^5.4.0

  # Maps
  google_maps_flutter: ^2.5.3

  # Charts
  fl_chart: ^0.66.2

  # Local storage
  shared_preferences: ^2.2.2

  # External links
  url_launcher: ^6.2.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: NotoSerifSC
      fonts:
        - asset: assets/fonts/NotoSerifSC-Regular.ttf
        - asset: assets/fonts/NotoSerifSC-Bold.ttf
          weight: 700
