<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eregen 颐贞 — 家属APP首页</title>
<style>
  :root {
    --primary: #2563EB;
    --primary-light: #DBEAFE;
    --success: #16A34A;
    --warning: #F59E0B;
    --danger: #EF4444;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-500: #6B7280;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-800: #1F2937;
    --gray-900: #111827;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--gray-100);
    color: var(--gray-800);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Top Bar ===== */
  .top-bar {
    background: white;
    padding: 12px 16px 8px;
    z-index: 100;
    flex-shrink: 0;
  }
  .top-bar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #2563EB, #7C3AED);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 16px;
  }
  .brand-name {
    font-size: 18px; font-weight: 700; color: var(--gray-900);
  }
  .brand-sub {
    font-size: 11px; color: var(--gray-500); margin-left: 4px;
  }
  .top-actions {
    display: flex; gap: 8px;
  }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 18px;
    border: none;
    background: var(--gray-100);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    position: relative;
    font-size: 18px;
  }
  .icon-btn .badge {
    position: absolute; top: 2px; right: 2px;
    width: 10px; height: 10px;
    background: var(--danger);
    border-radius: 50%;
    border: 2px solid white;
  }

  /* Elder Selector */
  .elder-selector {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding: 4px 0;
  }
  .elder-selector::-webkit-scrollbar { display: none; }
  .elder-card {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px 8px 8px;
    border-radius: 24px;
    border: 2px solid var(--gray-200);
    background: white;
    cursor: pointer;
    transition: all 0.2s;
  }
  .elder-card.active {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .elder-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .elder-info { line-height: 1.3; }
  .elder-name { font-size: 14px; font-weight: 600; color: var(--gray-800); }
  .elder-status { font-size: 11px; color: var(--gray-500); display: flex; align-items: center; gap: 4px; }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; display: inline-block;
  }
  .status-dot.online { background: var(--success); }
  .status-dot.offline { background: var(--gray-300); }
  .status-dot.warning { background: var(--warning); }

  /* ===== Map Area ===== */
  .map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
    background: #E8F0FE;
  }
  .map-placeholder {
    width: 100%; height: 100%;
    position: relative;
    background:
      radial-gradient(circle at 30% 40%, #D4E4FC 0%, transparent 50%),
      radial-gradient(circle at 70% 60%, #D4E4FC 0%, transparent 40%),
      linear-gradient(135deg, #E8F0FE 0%, #F0F4FF 100%);
  }
  /* Simulated roads */
  .map-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, transparent 49.5%, rgba(255,255,255,0.7) 49.5%, rgba(255,255,255,0.7) 50.5%, transparent 50.5%),
      linear-gradient(0deg, transparent 49.5%, rgba(255,255,255,0.7) 49.5%, rgba(255,255,255,0.7) 50.5%, transparent 50.5%),
      linear-gradient(90deg, transparent 20%, rgba(255,255,255,0.4) 20%, rgba(255,255,255,0.4) 20.5%, transparent 20.5%),
      linear-gradient(90deg, transparent 60%, rgba(255,255,255,0.4) 60%, rgba(255,255,255,0.4) 60.5%, transparent 60.5%),
      linear-gradient(0deg, transparent 30%, rgba(255,255,255,0.4) 30%, rgba(255,255,255,0.4) 30.5%, transparent 30.5%),
      linear-gradient(0deg, transparent 70%, rgba(255,255,255,0.4) 70%, rgba(255,255,255,0.4) 70.5%, transparent 70.5%);
  }
  /* Map label */
  .map-label {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--gray-600);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    z-index: 10;
  }
  .map-label strong { color: var(--gray-800); }

  /* Geofence polygon */
  .geofence {
    position: absolute;
    top: 35%; left: 30%;
    width: 40%; height: 35%;
    border: 2.5px dashed var(--primary);
    border-radius: 20px;
    background: rgba(37,99,235,0.06);
    z-index: 5;
  }
  .geofence-label {
    position: absolute;
    top: -20px; left: 0;
    font-size: 10px;
    color: var(--primary);
    background: rgba(255,255,255,0.9);
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }

  /* Location pin */
  .location-pin {
    position: absolute;
    top: 48%; left: 50%;
    transform: translate(-50%, -100%);
    z-index: 10;
    filter: drop-shadow(0 4px 12px rgba(37,99,235,0.4));
  }
  .pin-dot {
    width: 20px; height: 20px;
    background: var(--primary);
    border-radius: 50%;
    border: 3px solid white;
    position: relative;
  }
  .pin-pulse {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    background: rgba(37,99,235,0.15);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    50% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
  }

  /* Map controls */
  .map-controls {
    position: absolute;
    right: 12px; bottom: 120px;
    display: flex; flex-direction: column;
    gap: 8px; z-index: 10;
  }
  .map-ctrl-btn {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border: none;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    cursor: pointer;
  }

  /* ===== Status Card (Bottom Sheet) ===== */
  .status-card {
    flex-shrink: 0;
    background: white;
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.08);
    z-index: 50;
    transition: transform 0.3s ease;
    max-height: 50vh;
    overflow-y: auto;
  }
  .status-card.collapsed { transform: translateY(calc(100% - 120px)); }
  .card-handle {
    width: 36px; height: 4px;
    background: var(--gray-300);
    border-radius: 2px;
    margin: 10px auto 0;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
  }
  .card-title {
    font-size: 16px; font-weight: 700; color: var(--gray-900);
  }
  .card-time {
    font-size: 12px; color: var(--gray-500);
  }
  .card-time span { color: var(--success); font-weight: 600; }

  /* Quick Stats Grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 8px 16px 12px;
  }
  .stat-item {
    background: var(--gray-50);
    border-radius: 14px;
    padding: 12px 10px;
    text-align: center;
  }
  .stat-icon { font-size: 22px; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--gray-900); line-height: 1.2; }
  .stat-unit { font-size: 11px; color: var(--gray-500); font-weight: 400; }
  .stat-label { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
  .stat-item.danger { background: #FEF2F2; }
  .stat-item.danger .stat-value { color: var(--danger); }
  .stat-item.success { background: #F0FDF4; }
  .stat-item.success .stat-value { color: var(--success); }

  /* Battery Row */
  .battery-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px 12px;
  }
  .battery-icon-wrap {
    display: flex; align-items: center; gap: 6px;
  }
  .battery-bar {
    width: 48px; height: 22px;
    border: 2px solid var(--gray-400);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .battery-bar::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 72%;
    background: var(--success);
    border-radius: 2px;
  }
  .battery-tip {
    width: 4px; height: 10px;
    background: var(--gray-400);
    border-radius: 0 2px 2px 0;
  }
  .battery-text { font-size: 13px; font-weight: 600; color: var(--gray-700); }

  /* Quick Actions */
  .quick-actions {
    display: flex;
    gap: 10px;
    padding: 4px 16px 16px;
  }
  .action-btn {
    flex: 1;
    padding: 10px 0;
    border-radius: 12px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .action-btn.primary {
    background: var(--primary);
    color: white;
  }
  .action-btn.secondary {
    background: var(--gray-100);
    color: var(--gray-700);
  }
  .action-btn.emergency {
    background: var(--danger);
    color: white;
  }

  /* ===== Bottom Nav ===== */
  .bottom-nav {
    display: flex;
    background: white;
    border-top: 1px solid var(--gray-200);
    flex-shrink: 0;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0 6px;
    gap: 2px;
    cursor: pointer;
    color: var(--gray-500);
    font-size: 10px;
    border: none;
    background: none;
  }
  .nav-item.active { color: var(--primary); }
  .nav-icon { font-size: 22px; }
  .nav-label { font-weight: 500; }

  /* SOS Alert Banner */
  .sos-banner {
    background: linear-gradient(135deg, #DC2626, #EF4444);
    color: white;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    animation: bannerPulse 2s ease-in-out infinite;
  }
  @keyframes bannerPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.92; }
  }
  .sos-icon { font-size: 24px; }
  .sos-text { font-size: 13px; font-weight: 600; flex: 1; }
  .sos-text small { font-weight: 400; opacity: 0.85; font-size: 11px; }
  .sos-btn {
    background: white;
    color: var(--danger);
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- SOS Alert Banner -->
<div class="sos-banner">
  <span class="sos-icon">&#9888;</span>
  <div class="sos-text">
    爷爷 张三丰 触发SOS紧急呼叫<br>
    <small>2分钟前 · 位置：上海市浦东新区陆家嘴环路1000号</small>
  </div>
  <button class="sos-btn">查看处理</button>
</div>

<!-- Top Bar -->
<div class="top-bar">
  <div class="top-bar-header">
    <div class="brand">
      <div class="brand-icon">颐</div>
      <span class="brand-name">Eregen<span class="brand-sub">颐贞</span></span>
    </div>
    <div class="top-actions">
      <button class="icon-btn">&#128276;</button>
      <button class="icon-btn">&#128276;<span class="badge"></span></button>
    </div>
  </div>
  <div class="elder-selector">
    <div class="elder-card active">
      <div class="elder-avatar" style="background:#FEF3C7;">&#128105;</div>
      <div class="elder-info">
        <div class="elder-name">爷爷 张三丰</div>
        <div class="elder-status"><span class="status-dot online"></span>在线 · 手环Pro</div>
      </div>
    </div>
    <div class="elder-card">
      <div class="elder-avatar" style="background:#FCE7F3;">&#128104;</div>
      <div class="elder-info">
        <div class="elder-name">奶奶 李秀英</div>
        <div class="elder-status"><span class="status-dot online"></span>在线 · 手环Plus</div>
      </div>
    </div>
    <div class="elder-card">
      <div class="elder-avatar" style="background:#E0E7FF;">&#128105;</div>
      <div class="elder-info">
        <div class="elder-name">外公 王建国</div>
        <div class="elder-status"><span class="status-dot offline"></span>离线 · 手环Starter</div>
      </div>
    </div>
  </div>
</div>

<!-- Map Area -->
<div class="map-container">
  <div class="map-placeholder">
    <div class="map-label"><strong>实时定位</strong> · 更新于 1分钟前</div>

    <!-- Geofence -->
    <div class="geofence">
      <div class="geofence-label">&#127970; 安全区域：家周边 500m</div>
    </div>

    <!-- Location Pin -->
    <div class="location-pin">
      <div class="pin-pulse"></div>
      <div class="pin-dot"></div>
    </div>
  </div>

  <!-- Map Controls -->
  <div class="map-controls">
    <button class="map-ctrl-btn">&#128269;</button>
    <button class="map-ctrl-btn">&#10526;</button>
    <button class="map-ctrl-btn">&#128205;</button>
  </div>
</div>

<!-- Status Card (Bottom Sheet) -->
<div class="status-card collapsed" id="statusCard">
  <div class="card-handle"></div>
  <div class="card-header">
    <span class="card-title">健康状态</span>
    <span class="card-time">最后更新：<span>2分钟前</span></span>
  </div>

  <div class="stats-grid">
    <div class="stat-item success">
      <div class="stat-icon">&#9825;</div>
      <div class="stat-value">72<span class="stat-unit"> bpm</span></div>
      <div class="stat-label">心率</div>
    </div>
    <div class="stat-item success">
      <div class="stat-icon">&#127807;</div>
      <div class="stat-value">98<span class="stat-unit"> %</span></div>
      <div class="stat-label">血氧</div>
    </div>
    <div class="stat-item">
      <div class="stat-icon">&#128736;</div>
      <div class="stat-value">3,456</div>
      <div class="stat-label">今日步数</div>
    </div>
    <div class="stat-item">
      <div class="stat-icon">&#127776;</div>
      <div class="stat-value">2.1<span class="stat-unit"> km</span></div>
      <div class="stat-label">今日距离</div>
    </div>
    <div class="stat-item">
      <div class="stat-icon">&#128294;</div>
      <div class="stat-value">85<span class="stat-unit"> %</span></div>
      <div class="stat-label">电池电量</div>
    </div>
    <div class="stat-item danger">
      <div class="stat-icon">&#9888;</div>
      <div class="stat-value">1</div>
      <div class="stat-label">今日告警</div>
    </div>
  </div>

  <div class="battery-row">
    <div class="battery-icon-wrap">
      <div class="battery-bar"></div>
      <div class="battery-tip"></div>
    </div>
    <span class="battery-text">剩余约 3 天续航</span>
  </div>

  <div class="quick-actions">
    <button class="action-btn emergency">&#9888; 一键呼叫</button>
    <button class="action-btn primary">&#128276; 语音通话</button>
    <button class="action-btn secondary">&#128203; 历史轨迹</button>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <button class="nav-item active">
    <span class="nav-icon">&#127968;</span>
    <span class="nav-label">首页</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">&#128133;</span>
    <span class="nav-label">健康</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">&#9888;</span>
    <span class="nav-label">告警</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">&#128139;</span>
    <span class="nav-label">用药</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">&#128100;</span>
    <span class="nav-label">我的</span>
  </button>
</div>

<script>
  // Toggle status card expand/collapse
  const card = document.getElementById('statusCard');
  let expanded = false;
  card.addEventListener('click', () => {
    expanded = !expanded;
    card.classList.toggle('collapsed', !expanded);
  });
</script>
</body>
</html>
