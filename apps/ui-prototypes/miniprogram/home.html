<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>颐贞 · 微信小程序 — 首页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #EDEDED; color: #333; }

.phone-frame {
  width: 375px; height: 812px; margin: 40px auto; background: #fff;
  border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  overflow: hidden; position: relative; border: 12px solid #1a1a2e;
}

/* WeChat status bar */
.wx-status {
  height: 44px; background: #07C160; display: flex; justify-content: space-between;
  align-items: center; padding: 0 20px; color: #fff;
}
.wx-status .time { font-size: 15px; font-weight: 700; }
.wx-status-icons { display: flex; gap: 4px; }

/* WeChat nav bar */
.wx-nav {
  height: 44px; background: #07C160; display: flex; align-items: center;
  justify-content: center; color: #fff; font-size: 17px; font-weight: 600;
  padding: 0 20px;
}
.wx-nav-back { position: absolute; left: 16px; font-size: 18px; }

/* Content */
.content { padding: 0; }

/* Search bar */
.search-bar {
  margin: 12px 16px; background: #f7f7f7; border-radius: 20px;
  padding: 10px 16px; display: flex; align-items: center; gap: 8px;
  color: #999; font-size: 14px;
}
.search-bar span { font-size: 16px; }

/* Elderly selector */
.elderly-selector {
  margin: 0 16px 12px; background: linear-gradient(135deg, #07C160, #06AD56);
  border-radius: 14px; padding: 16px; color: #fff;
  display: flex; align-items: center; gap: 12px;
}
.elderly-avatar {
  width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center; font-size: 22px;
}
.elderly-info { flex: 1; }
.elderly-name { font-size: 16px; font-weight: 600; }
.elderly-status { font-size: 12px; opacity: 0.85; margin-top: 2px; }

/* Quick actions */
.quick-actions {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  padding: 16px 0; margin: 0 16px; background: #fff;
  border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.quick-action {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 12px 0; cursor: pointer;
}
.quick-action-icon {
  width: 48px; height: 48px; border-radius: 14px; display: flex;
  align-items: center; justify-content: center; font-size: 22px;
}
.qa-blue { background: #E3F2FD; }
.qa-green { background: #E8F5E9; }
.qa-orange { background: #FFF3E0; }
.qa-purple { background: #F3E5F5; }
.quick-action-label { font-size: 12px; color: #666; }

/* Location card */
.location-card {
  margin: 12px 16px; background: #fff; border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04); overflow: hidden;
}
.location-map {
  height: 140px; background: linear-gradient(135deg, #E8F4FD, #D1ECF9);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.map-pin { font-size: 32px; animation: bounce 2s infinite; }
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.location-info {
  padding: 12px 16px; display: flex; justify-content: space-between;
  align-items: center; border-top: 1px solid #f5f5f5;
}
.location-text { font-size: 14px; font-weight: 600; }
.location-time { font-size: 11px; color: #bbb; }
.location-arrow { color: #ccc; font-size: 16px; }

/* Health summary */
.health-summary {
  margin: 12px 16px; background: #fff; border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04); padding: 16px;
}
.summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.summary-title { font-size: 16px; font-weight: 700; }
.summary-more { font-size: 12px; color: #07C160; }
.summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.summary-item { text-align: center; }
.summary-icon { font-size: 20px; margin-bottom: 4px; }
.summary-value { font-size: 20px; font-weight: 800; }
.summary-label { font-size: 11px; color: #999; margin-top: 2px; }
.summary-unit { font-size: 11px; color: #bbb; }

/* Medication reminder */
.med-reminder {
  margin: 12px 16px; background: linear-gradient(135deg, #FFF7E6, #FFF0B3);
  border-radius: 14px; padding: 16px; border: 1px solid #FFE58F;
}
.med-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.med-title { font-size: 14px; font-weight: 700; color: #AD6800; }
.med-time { font-size: 12px; color: #FA8C16; }
.med-list { display: flex; gap: 8px; flex-wrap: wrap; }
.med-pill {
  background: #fff; border-radius: 8px; padding: 6px 12px;
  font-size: 12px; color: #666; display: flex; align-items: center; gap: 4px;
}
.med-taken { color: #52C41A; }
.med-pending { color: #FA8C16; }

/* Recent alerts */
.recent-alerts {
  margin: 12px 16px; background: #fff; border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04); overflow: hidden;
}
.alerts-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f5f5f5; }
.alerts-title { font-size: 16px; font-weight: 700; }
.alerts-count { background: #FF4D4F; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.alert-item {
  padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid #f9f9f9;
}
.alert-item:last-child { border-bottom: none; }
.alert-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot-red { background: #FF4D4F; }
.dot-orange { background: #FA8C16; }
.alert-content { flex: 1; }
.alert-text { font-size: 13px; font-weight: 500; }
.alert-meta { font-size: 11px; color: #bbb; margin-top: 2px; }

/* Bottom tab bar */
.tab-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 64px;
  background: #fff; border-top: 1px solid #e8e8e8;
  display: flex; justify-content: space-around; align-items: center;
}
.tab-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: 10px; color: #999;
}
.tab-item.active { color: #07C160; }
.tab-icon { font-size: 22px; }

.home-indicator {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  width: 134px; height: 5px; background: #ddd; border-radius: 3px;
}
</style>
</head>
<body>

  <!-- Tab bar -->

</div>

</body>
</html>
