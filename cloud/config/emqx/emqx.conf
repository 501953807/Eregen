# Eregen EMQX Configuration
# © 2026 Eregen (颐贞). All rights reserved.

## === Cluster ===
cluster.name = eregen-mqtt

## === Dashboard ===
dashboard.default_username = admin
dashboard.default_password = eregen_dev_change_me

## === MQTT Listeners ===

## Plain TCP listener (internal, development)
listeners.listener.tcp.default = true
listeners.listener.tcp.bind = 1883
listeners.listener.tcp.max_connections = 1024000

## TLS/SSL listener (port 8883 — used by firmware devices)
listeners.listener.ssl-default.enabled = true
listeners.listener.ssl-default.bind = 8883
listeners.listener.ssl-default.max_connections = 512000

listeners.listener.ssl-default.ssl.cafile = /etc/certs/ca.crt
listeners.listener.ssl-default.ssl.certfile = /etc/certs/server.crt
listeners.listener.ssl-default.ssl.keyfile = /etc/certs/server.key

# Require client certificate (mTLS) for device connections
listeners.listener.ssl-default.ssl.verify = verify_peer
listeners.listener.ssl-default.ssl.fail_if_no_peer_cert = false

# TLS protocol version
listeners.listener.ssl-default.sslVersions = tlsv1.2

# Session cleanup on disconnect
listeners.listener.ssl-default.session_max_delay = 0
listeners.listener.ssl-default.heartbeat = 60
